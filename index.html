<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)" />

    <title>Family Movie Watchlist — Films &amp; Family Discussion Topics</title>
    <meta
      name="description"
      content="A curated family movie watchlist with trailers and thoughtful discussion topics for parents of teenagers."
    />
    <meta
      name="keywords"
      content="family movies, movie watchlist, family movie night, discussion topics, teen movies, parents, film discussion"
    />
    <meta name="author" content="Mike Richter" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://movies.mikerichter.app/" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Family Movie Watchlist" />
    <meta property="og:title" content="Family Movie Watchlist" />
    <meta
      property="og:description"
      content="A curated family movie watchlist with trailers and thoughtful discussion topics for parents of teenagers."
    />
    <meta property="og:url" content="https://movies.mikerichter.app/" />
    <meta property="og:image" content="https://movies.mikerichter.app/og-image.svg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Family Movie Watchlist" />
    <meta
      name="twitter:description"
      content="A curated family movie watchlist with trailers and thoughtful discussion topics for parents of teenagers."
    />
    <meta name="twitter:image" content="https://movies.mikerichter.app/og-image.svg" />

    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Family Movie Watchlist",
        "url": "https://movies.mikerichter.app/",
        "description": "A curated family movie watchlist with trailers and thoughtful discussion topics for parents of teenagers.",
        "inLanguage": "en-US",
        "author": { "@type": "Person", "name": "Mike Richter" }
      }
    </script>

    <!-- Applies saved/preferred theme before paint to avoid a flash. -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
